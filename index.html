<!DOCTYPE html>
<html>
<head>
    <title>BART Live Train Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #111; color: #ccc; min-height: 100vh; }

        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        #tracker {
            display: none;
            padding: 24px 20px;
        }

        .logo {
            font-size: 12px;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            color: #555;
            font-size: 13px;
            margin-bottom: 60px;
            text-align: center;
        }

        .pick-label {
            color: #666;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .line-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 340px;
        }

        .line-btn {
            padding: 16px 24px;
            font-family: monospace;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            text-align: left;
            letter-spacing: 1px;
            transition: opacity 0.15s;
        }

        .line-btn:hover { opacity: 0.75; }

        .back-btn {
            background: transparent;
            border: none;
            color: #555;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 20px;
            padding: 0;
        }

        .back-btn:hover { color: #aaa; }

        .tracker-header { margin-bottom: 20px; }

        .tracker-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .clock {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 7px 10px; color: #555; border-bottom: 1px solid #2a2a2a; font-size: 11px; letter-spacing: 1px; }
        td { padding: 8px 10px; border-bottom: 1px solid #1e1e1e; font-size: 13px; }

        .station-name { color: #fff; font-weight: bold; }
        .destination { color: #aaa; }
        .dir { color: #555; font-size: 11px; }
        .eta { font-weight: bold; font-size: 14px; }
        .leaving { color: #ff4444; }
        .soon { color: #ffaa00; }
        .normal { color: #44cc44; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .loading { text-align: center; padding: 60px; color: #444; font-size: 14px; }
        .no-trains { color: #555; padding: 30px 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="home">
        <div class="logo">Bay Area Rapid Transit — California</div>
        <h1>BART LIVE TRAIN TRACKER</h1>
        <div class="subtitle">Real-time arrivals — Pacific Time</div>
        <div class="pick-label">Choose a line</div>
        <div class="line-buttons">
            <button class="line-btn" style="color:#FFD700; border-color:#FFD700;" onclick="open_line('YELLOW')">Yellow Line</button>
            <button class="line-btn" style="color:#ff6600; border-color:#ff6600;" onclick="open_line('ORANGE')">Orange Line</button>
            <button class="line-btn" style="color:#cc0000; border-color:#cc0000;" onclick="open_line('RED')">Red Line</button>
            <button class="line-btn" style="color:#339933; border-color:#339933;" onclick="open_line('GREEN')">Green Line</button>
            <button class="line-btn" style="color:#0066cc; border-color:#0066cc;" onclick="open_line('BLUE')">Blue Line</button>
            <button class="line-btn" style="color:#cc33cc; border-color:#cc33cc;" onclick="open_line('BEIGE')">Beige Line</button>
        </div>
    </div>

    <div id="tracker">
        <button class="back-btn" onclick="go_home()">back to lines</button>
        <div class="tracker-header">
            <div class="tracker-title" id="tracker-title"></div>
            <div class="clock" id="clock"></div>
        </div>
        <div id="board"><div class="loading">fetching train data...</div></div>
    </div>

    <script>
        var api = "https://api.bart.gov/api/etd.aspx?cmd=etd&orig=ALL&key=MW9S-E7SL-26DU-VV8V&json=y"
        var picked = null
        var timer = null

        var line_colors = {
            YELLOW: "#FFD700",
            ORANGE: "#ff6600",
            RED:    "#cc0000",
            GREEN:  "#339933",
            BLUE:   "#0066cc",
            BEIGE:  "#cc33cc"
        }

        var line_names = {
            YELLOW: "Yellow",
            ORANGE: "Orange",
            RED:    "Red",
            GREEN:  "Green",
            BLUE:   "Blue",
            BEIGE:  "Beige"
        }

        function pacific_time() {
            return new Date().toLocaleTimeString("en-US", {
                timeZone: "America/Los_Angeles",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            })
        }

        function open_line(line) {
            picked = line
            document.getElementById("home").style.display = "none"
            document.getElementById("tracker").style.display = "block"

            var color = line_colors[line]
            var title = document.getElementById("tracker-title")
            title.style.color = color
            title.textContent = line_names[line] + " Line — Live Arrivals"

            grab_data()
            timer = setInterval(grab_data, 15000)
        }

        function go_home() {
            picked = null
            clearInterval(timer)
            document.getElementById("tracker").style.display = "none"
            document.getElementById("home").style.display = "flex"
            document.getElementById("board").innerHTML = '<div class="loading">fetching train data...</div>'
        }

        function eta_class(minutes) {
            if (minutes === "Leaving") return "leaving"
            if (parseInt(minutes) <= 3) return "soon"
            return "normal"
        }

        function eta_display(minutes) {
            if (minutes === "Leaving") return "Leaving now"
            return minutes + " min"
        }

        function direction_short(dir) {
            if (dir === "North") return "N"
            if (dir === "South") return "S"
            if (dir === "East") return "E"
            return "W"
        }

        function build_row(station, destination, train) {
            var mins = train.minutes
            var color = line_colors[picked] || "#ccc"

            var row = "<tr>"
            row += '<td class="station-name">' + station + '</td>'
            row += '<td class="destination"><span class="dot" style="background:' + color + '"></span>' + destination + '</td>'
            row += '<td class="dir">' + direction_short(train.direction) + '</td>'
            row += '<td class="eta ' + eta_class(mins) + '">' + eta_display(mins) + '</td>'
            row += "</tr>"
            return row
        }

        function draw_board(stops) {
            var html = "<table>"
            html += "<tr><th>STATION</th><th>DESTINATION</th><th>DIR</th><th>ETA (PT)</th></tr>"

            if (stops.length === 0) {
                html += '<tr><td colspan="4" class="no-trains">No active trains on this line right now. Check back shortly.</td></tr>'
            }

            for (var i = 0; i < stops.length; i++) {
                var s = stops[i]
                html += build_row(s.station, s.destination, s.train)
            }

            html += "</table>"
            document.getElementById("board").innerHTML = html
            document.getElementById("clock").textContent = "last updated: " + pacific_time() + " PT — refreshes every 15 sec"
        }

        function grab_data() {
            fetch(api)
                .then(function(res) { return res.json() })
                .then(function(data) {
                    var stations = data.root.station
                    if (!stations) {
                        document.getElementById("board").innerHTML = '<div class="no-trains">Could not load train data. Try again shortly.</div>'
                        return
                    }

                    var stops = []

                    for (var s = 0; s < stations.length; s++) {
                        var station = stations[s]
                        var departures = station.etd
                        if (!departures) continue

                        for (var d = 0; d < departures.length; d++) {
                            var dest = departures[d]
                            var estimates = dest.estimate
                            if (!estimates) continue

                            for (var e = 0; e < estimates.length; e++) {
                                var train = estimates[e]
                                if (train.color.toUpperCase() !== picked) continue

                                stops.push({
                                    station: station.name,
                                    destination: dest.destination,
                                    train: train
                                })
                            }
                        }
                    }

                    stops.sort(function(a, b) {
                        var a_min = a.train.minutes === "Leaving" ? 0 : parseInt(a.train.minutes)
                        var b_min = b.train.minutes === "Leaving" ? 0 : parseInt(b.train.minutes)
                        return a_min - b_min
                    })

                    draw_board(stops)
                })
                .catch(function() {
                    document.getElementById("board").innerHTML = '<div class="no-trains">Could not reach the BART API. Check your connection and try again.</div>'
                    document.getElementById("clock").textContent = "last attempted: " + pacific_time() + " PT"
                })
        }
    </script>
</body>
</html>
